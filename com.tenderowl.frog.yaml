id: "com.tenderowl.frog"
runtime: "org.gnome.Platform"
runtime-version: "50"
sdk: "org.gnome.Sdk"
sdk-extensions:
  - "org.freedesktop.Sdk.Extension.rust-stable"
  - "org.freedesktop.Sdk.Extension.llvm22"
command: "frog"
finish-args:
  - "--share=network"
  - "--share=ipc"
  - "--socket=fallback-x11"
  - "--device=dri"
  - "--socket=wayland"
build-options:
  append-path: "/usr/lib/sdk/rust-stable/bin"
  prepend-path: "/usr/lib/sdk/llvm22/bin"
  prepend-ld-library-path: "/usr/lib/sdk/llvm22/lib"
  build-args:
    - "--share=network"
  env:
    RUST_BACKTRACE: "1"
    RUST_LOG: "frog=debug"
cleanup:
  - "/include"
  - "/lib/pkgconfig"
  - "/man"
  - "/share/doc"
  - "/share/gtk-doc"
  - "/share/man"
  - "/share/pkgconfig"
  - "*.la"
  - "*.a"
modules:
  # - "build-aux/leptonica.yaml"
  # - "build-aux/tesseract.yaml"
  - name: "frog"
    builddir: true
    buildsystem: "meson"
    # config-opts:
    #   - "--env=HOME=~/.tesseract-rs"
    sources:
      - type: "dir"
        path: "."
