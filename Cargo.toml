[package]
name = "frog"
version = "0.1.0"
edition = "2021"

[dependencies]
ashpd = { version = "0.12", features = ["async-std", "gtk4", "tracing"], default-features = false }
# candle-core = { git = "https://github.com/huggingface/candle.git", version = "0.9.2-alpha.2" }
gettext-rs = { version = "0.7", features = ["gettext-system"] }
gtk = { version = "0.10", package = "gtk4", features = ["gnome_49"] }
image = "0.24"
kalosm = { version = "0.4", default-features = false, features = ["vision"] } #, "mkl"] }
tesseract-rs = "0.1.20"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dependencies.adw]
package = "libadwaita"
version = "0.8"
features = ["v1_8"]
